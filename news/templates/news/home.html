<!DOCTYPE html>
<html>
<head>
    <title>NDANA DYNASTY</title>
</head>
<body>
    <h1>Welcome to NDANA DYNASTY</h1>
    <p>Our family hub for news and updates.</p>

    {% for post in posts %}
        <div>
            <h2>{{ post.title }}</h2>
            <p>{{ post.content }}</p>
            <small>By {{ post.author }} on {{ post.created_at }}</small>
        </div>
    {% empty %}
        <p>No posts yet. Add one in the admin panel!</p>
    {% endfor %}
</body>
</html>
