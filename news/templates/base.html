<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NDANA DYNASTY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">NDANA DYNASTY</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'add_post' %}">Add Event</a></li>
      </ul>
    </div>
  </div>
</nav>

<header class="bg-light text-center py-5">
  <h1>Welcome to NDANA DYNASTY</h1>
  <p class="lead">Our family hub for news and updates.</p>
</header>

<div class="container my-5">
    {% block content %}{% endblock %}
</div>

<footer class="bg-dark text-white text-center py-3">
  <p>© 2026 NDANA DYNASTY. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Simple pop-up notification -->
<script>
  {% if messages %}
    {% for message in messages %}
      alert("{{ message }}");
    {% endfor %}
  {% endif %}
</script>

</body>
</html>
